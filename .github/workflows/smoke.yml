name: Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-24.04
    env:
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: llvmpipe
      GTK_A11Y: none
      # GitHub-hosted runners deny the user namespaces required by WebKit's
      # Bubblewrap sandbox. Velocity does not enable a WebView in this shell.
      WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: "1"
    strategy:
      fail-fast: false
      matrix:
        suite:
          - perf
          - task
          - test
          - launch
          - explorer
          - review-snippet
          - terminal
          - diagnostics
          - lsp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            libegl-mesa0 \
            libgl1-mesa-dri \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            mesa-vulkan-drivers \
            ripgrep \
            xvfb
      - name: Install project dependencies
        run: npm ci
      - name: Install typescript-language-server (lsp suite)
        if: matrix.suite == 'lsp'
        run: npm install -g typescript-language-server typescript
      - name: Run smoke suite
        # Start Xvfb first so D-Bus-activated GTK portals inherit DISPLAY.
        run: xvfb-run -a dbus-run-session -- npm run smoke:${{ matrix.suite }}
      - name: Print app logs after failure
        if: failure()
        run: |
          for log in /tmp/velocity-*.out; do
            test -f "$log" || continue
            echo "::group::$log"
            awk '{ print }' "$log"
            echo "::endgroup::"
          done
      - name: Upload app logs after failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.suite }}-logs
          path: /tmp/velocity-*.out
          if-no-files-found: ignore
